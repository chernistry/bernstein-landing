name: bernstein-landing

services:
  bernstein-landing:
    build: .
    container_name: bernstein-landing
    restart: unless-stopped
    env_file:
      # On the VPS at /srv/bernstein-landing/app/.env, set:
      #   RESEND_API_KEY_BERNSTEIN=re_...
      #   BERNSTEIN_AUDIENCE_ID=<resend audience uuid>
      - .env
    networks:
      - deploy_homepage

networks:
  deploy_homepage:
    external: true
