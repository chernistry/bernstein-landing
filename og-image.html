<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bernstein OG Image</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fafafa;
      overflow: hidden;
      position: relative;
    }
    /* Subtle gradient background */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 60% 50%, rgba(59,130,246,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 80px;
    }
    .icon {
      margin-bottom: 32px;
    }
    .icon svg {
      width: 72px;
      height: 72px;
    }
    .title {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
      line-height: 1.1;
    }
    .title .gradient {
      background: linear-gradient(135deg, #3b82f6, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 28px;
      color: #a1a1aa;
      line-height: 1.5;
      max-width: 800px;
      margin: 0 auto 36px;
    }
    .badges {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    .badge {
      padding: 8px 20px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 600;
      border: 1px solid rgba(59,130,246,0.3);
      background: rgba(59,130,246,0.1);
      color: #60a5fa;
    }
    .url {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 22px;
      color: #52525b;
      font-weight: 500;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="72" height="72">
        <line x1="12" y1="52" x2="52" y2="12" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
        <circle cx="52" cy="12" r="4" fill="#60a5fa"/>
        <ellipse cx="12" cy="52" rx="6" ry="4" fill="#3b82f6" transform="rotate(-45 12 52)"/>
      </svg>
    </div>
    <div class="title">
      <span class="gradient">Bernstein</span>
    </div>
    <div class="tagline">
      Orchestrate parallel AI coding agents on your codebase.<br>
      Any model. One command.
    </div>
    <div class="badges">
      <div class="badge">Open Source</div>
      <div class="badge">29 Agent Adapters</div>
      <div class="badge">Apache 2.0</div>
    </div>
  </div>
  <div class="url">bernstein.run</div>
</body>
</html>
