server {
    listen 80;
    server_name bernstein.run www.bernstein.run;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://buttondown.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://buttondown.com;" always;

    # ── SEO headers ───────────────────────────────────────────────────
    add_header X-Robots-Tag "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" always;
    add_header Link '<https://bernstein.run/>; rel="canonical"' always;

    # ── Gzip compression ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        application/manifest+json;

    # ── MIME types ────────────────────────────────────────────────────
    types {
        text/html                             html htm;
        text/css                              css;
        text/xml                              xml;
        text/plain                            txt;
        application/json                      json;
        application/manifest+json             webmanifest;
        image/svg+xml                         svg svgz;
        image/x-icon                          ico;
        application/javascript                js;
    }

    # ── Main page ─────────────────────────────────────────────────────
    location = / {
        try_files /index.html =404;
    }

    # ── Well-known directory ──────────────────────────────────────────
    location /.well-known/ {
        default_type application/json;
        try_files $uri =404;
    }

    location = /.well-known/security.txt {
        default_type text/plain;
    }

    # ── AI/SEO text files ─────────────────────────────────────────────
    location = /llms.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /llms-full.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /ai.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /robots.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /humans.txt {
        default_type text/plain;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
        default_type application/xml;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── Static assets caching ─────────────────────────────────────────
    location ~* \.(svg|ico|css|js|png|jpg|jpeg|gif|webp|woff2|woff|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── JSON files ────────────────────────────────────────────────────
    location ~* \.json$ {
        default_type application/json;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # ── HTML files ────────────────────────────────────────────────────
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ── Default fallback ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── Custom error page ─────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
